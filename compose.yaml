services:
  postgres:
    image: 'postgres:18-alpine'
    environment:
      - 'POSTGRES_DB=sotd'
      - 'POSTGRES_PASSWORD=sotd'
      - 'POSTGRES_USER=sotd'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sotd -d sotd']
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - '5432:5432'
    logging:
      driver: 'local'
      options:
        max-size: '10m'
        max-file: '5'
    volumes:
      - 'postgres-data:/var/lib/postgresql/data'

volumes:
  postgres-data:
