# Production runtime defaults layered on top of application.properties.
# The `prod` profile also activates `container` via spring.profiles.group.prod.

# Production should never attempt local Docker Compose lifecycle management.
spring.docker.compose.lifecycle-management=none

# Prefer graceful pod/container shutdown so in-flight polling work can finish cleanly.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# Fail fast on missing production-critical secrets and redirect settings.
sotd.startup-validation.enabled=${SOTD_STARTUP_VALIDATION_ENABLED:true}
