# Staging runtime defaults layered on top of application.properties.
# The `staging` profile also activates `container` via spring.profiles.group.staging.

# Staging should behave like a deployed environment, not like local Docker Compose.
spring.docker.compose.lifecycle-management=none

# Prefer graceful shutdown so in-flight polling and callback work can finish cleanly.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# Honor Forwarded/X-Forwarded-* headers from the trusted staging ingress or upstream proxy.
server.forward-headers-strategy=${SERVER_FORWARD_HEADERS_STRATEGY:framework}
server.tomcat.redirect-context-root=${SERVER_TOMCAT_REDIRECT_CONTEXT_ROOT:false}

# Fail fast in staging so missing secrets and redirect mistakes are caught before prod.
sotd.startup-validation.enabled=${SOTD_STARTUP_VALIDATION_ENABLED:true}
