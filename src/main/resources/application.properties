spring.config.import=optional:file:.env[.properties]
spring.application.name=sotd-api
spring.profiles.group.local=dev
spring.profiles.group.staging=container
spring.profiles.group.prod=container
spring.datasource.url=${SOTD_DATABASE_URL:jdbc:postgresql://localhost:5432/sotd}
spring.datasource.username=${SOTD_DATABASE_USERNAME:sotd}
spring.datasource.password=${SOTD_DATABASE_PASSWORD:sotd}
spring.datasource.hikari.maximum-pool-size=${SOTD_DATABASE_POOL_SIZE:10}
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.docker.compose.lifecycle-management=start_only
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.sotd=${LOG_LEVEL_SOTD:INFO}
info.app.description=${INFO_APP_DESCRIPTION:Spotify polling and music insights API.}
info.app.version=${INFO_APP_VERSION:0.0.1-SNAPSHOT}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
server.forward-headers-strategy=${SERVER_FORWARD_HEADERS_STRATEGY:none}
springdoc.api-docs.path=/openapi
springdoc.swagger-ui.path=/docs
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha

spotify.base-url=${SPOTIFY_BASE_URL:https://api.spotify.com/v1}
spotify.accounts-base-url=${SPOTIFY_ACCOUNTS_BASE_URL:https://accounts.spotify.com}
spotify.client-id=${SPOTIFY_CLIENT_ID:}
spotify.client-secret=${SPOTIFY_CLIENT_SECRET:}
spotify.redirect-uri=${SPOTIFY_REDIRECT_URI:http://127.0.0.1:8080/api/spotify/callback}
spotify.scopes[0]=${SPOTIFY_SCOPE_1:user-read-recently-played}
spotify.scopes[1]=${SPOTIFY_SCOPE_2:user-read-playback-state}
spotify.scopes[2]=${SPOTIFY_SCOPE_3:user-read-currently-playing}
spotify.scopes[3]=${SPOTIFY_SCOPE_4:user-read-private}
spotify.show-dialog=${SPOTIFY_SHOW_DIALOG:false}
spotify.auth-state-ttl=${SPOTIFY_AUTH_STATE_TTL:PT10M}
spotify.polling.recently-played-interval=${SPOTIFY_RECENTLY_PLAYED_INTERVAL:PT2M}
spotify.polling.current-playback-interval=${SPOTIFY_CURRENT_PLAYBACK_INTERVAL:PT20S}

sotd.crypto.base64-key=${SOTD_CRYPTO_BASE64_KEY:}
sotd.upstream-auth.enabled=${SOTD_UPSTREAM_AUTH_ENABLED:true}
sotd.upstream-auth.shared-secret=${SOTD_UPSTREAM_AUTH_SHARED_SECRET:}
sotd.upstream-auth.issuer=${SOTD_UPSTREAM_AUTH_ISSUER:}
sotd.upstream-auth.audience=${SOTD_UPSTREAM_AUTH_AUDIENCE:}
sotd.upstream-auth.clock-skew=${SOTD_UPSTREAM_AUTH_CLOCK_SKEW:PT30S}
sotd.upstream-auth.query-parameter-name=${SOTD_UPSTREAM_AUTH_QUERY_PARAMETER:upstreamAuth}
sotd.upstream-auth.header-name=${SOTD_UPSTREAM_AUTH_HEADER:Authorization}
